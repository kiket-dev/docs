name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required permissions for the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize concurrent runs so a later push doesn't leapfrog an earlier one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm check

      - name: Build (static export)
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Ensure CNAME is in output
        # The Next.js `output: 'export'` step drops built assets in ./out.
        # GitHub Pages looks for a CNAME file there for the custom domain.
        run: cp public/CNAME out/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
