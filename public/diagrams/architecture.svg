<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-label="Kiket architecture — engine, API, apps, workspace git repo">
  <defs>
    <style>
      .layer { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .layer-engine { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; }
      .layer-trust { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; }
      .title { fill: #0f172a; font: 700 14px system-ui, sans-serif; }
      .item { fill: #334155; font: 600 11px system-ui, sans-serif; }
      .sub { fill: #64748b; font: 400 10px system-ui, sans-serif; }
      .flow { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 3 3; fill: none; }
      @media (prefers-color-scheme: dark) {
        .layer { fill: #0f172a; stroke: #334155; }
        .layer-engine { fill: rgba(99,102,241,0.15); stroke: #818cf8; }
        .layer-trust { fill: rgba(16,185,129,0.15); stroke: #34d399; }
        .title { fill: #f1f5f9; }
        .item { fill: #e2e8f0; }
        .sub { fill: #94a3b8; }
      }
    </style>
  </defs>

  <g>
    <rect class="layer" x="20" y="20" width="680" height="70" rx="12"/>
    <text class="title" x="40" y="46">Client surfaces</text>
    <text class="item" x="40" y="70">Web app · visual editor · boards · dashboards</text>
    <text class="sub" x="40" y="84">No-code, low-code, all-code — every user in the same place.</text>
  </g>

  <g>
    <rect class="layer" x="20" y="110" width="680" height="70" rx="12"/>
    <text class="title" x="40" y="136">API</text>
    <text class="item" x="40" y="160">REST · GraphQL · webhooks · 6 language SDKs · CLI · MCP</text>
    <text class="sub" x="40" y="174">Everything a client can do is an API call. Auth, RBAC, rate limits.</text>
  </g>

  <g>
    <rect class="layer-engine" x="20" y="200" width="680" height="70" rx="12"/>
    <text class="title" x="40" y="226">Engine</text>
    <text class="item" x="40" y="250">Workflow runtime · SLA timers · approval chains · automations</text>
    <text class="sub" x="40" y="264">Pure logic. Zero I/O. Returns intents the host executes — eliminates SSRF/SQLi by design.</text>
  </g>

  <g>
    <rect class="layer" x="20" y="290" width="330" height="90" rx="12"/>
    <text class="title" x="40" y="316">Workspace repo</text>
    <text class="item" x="40" y="340">.kiket/workflows/*.yaml</text>
    <text class="item" x="40" y="356">.kiket/boards/*.yaml</text>
    <text class="sub" x="40" y="372">Every config edit ships as a commit you can diff and revert.</text>
  </g>

  <g>
    <rect class="layer-trust" x="370" y="290" width="330" height="90" rx="12"/>
    <text class="title" x="390" y="316">Trust layer</text>
    <text class="item" x="390" y="340">Polygon anchors</text>
    <text class="item" x="390" y="356">Auditor verification</text>
    <text class="sub" x="390" y="372">Tamper-evident proof that doesn't depend on trusting us.</text>
  </g>

  <path class="flow" d="M 360 90 L 360 110"/>
  <path class="flow" d="M 360 180 L 360 200"/>
  <path class="flow" d="M 185 270 L 185 290"/>
  <path class="flow" d="M 535 270 L 535 290"/>
</svg>
